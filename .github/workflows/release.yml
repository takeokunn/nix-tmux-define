name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # required to create the GitHub Release

jobs:
  release:
    name: Build and publish release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes

      # Gate the release on the full quality suite and a successful build, so a
      # broken tag can never ship.
      - run: nix flake check --print-build-logs
      - run: nix build --print-build-logs

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            ## Install

            **With Nix (recommended)**
            ```bash
            nix profile install github:takeokunn/nix-tmux-define
            # or run without installing:
            nix run github:takeokunn/nix-tmux-define -- --help
            ```

            **With Cargo**
            ```bash
            cargo install nix-tmux-define
            ```

            See the [CHANGELOG](https://github.com/takeokunn/nix-tmux-define/blob/main/CHANGELOG.md)
            for details.
